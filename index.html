<script type='text/javascript'>

    function startChatSession() {
        const btn = document.getElementById('start-btn');
        btn.disabled = true;
        btn.innerText = "Caricamento...";
        
        document.getElementById('language-picker').disabled = true;
        document.getElementById('input-fullname').disabled = true;
        document.getElementById('input-type').disabled = true;
        document.getElementById('input-id').disabled = true;
        document.getElementById('input-nationality').disabled = true;

        const selectedLang = document.getElementById('language-picker').value;
        initEmbeddedMessaging(selectedLang);
    }

    function initEmbeddedMessaging(langCode) {
        console.log("--> INIT SALESFORCE START <--");

        try {
            embeddedservice_bootstrap.settings.language = langCode;
            
            // 1. Diciamo a Salesforce di nascondere il bottone al primissimo load
            embeddedservice_bootstrap.settings.hideChatButtonOnLoad = true;

            // 2. IL WORKAROUND: Spostiamo il bottone nativo fuori dallo schermo!
            // Quando Salesforce "forzerà" la sua riapparizione post-minimizzazione, 
            // verrà posizionato nello spazio invisibile fuori dal browser.
            embeddedservice_bootstrap.settings.chatButtonPosition = "-9999px, -9999px";

            window.addEventListener("onEmbeddedMessagingReady", () => {
                console.log(">>> EVENTO: Messaging Ready --> Invio parametri...");
                try {
                    const hiddenFields = {
                        "fullname":    document.getElementById('input-fullname').value,
                        "userType":    document.getElementById('input-type').value,
                        "nationality": document.getElementById('input-nationality').value,
                        "userId":      document.getElementById('input-id').value,
                    };
                    embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields(hiddenFields);
                } catch (e) {
                    console.error("Errore hidden fields:", e);
                    document.getElementById('status-msg').innerText = "Errore Parametri";
                    document.getElementById('status-msg').style.color = "red";
                }
            });

            window.addEventListener("onEmbeddedMessagingButtonCreated", () => {
                console.log(">>> EVENTO: Button Created --> Chat pronta all'uso");
                document.getElementById('status-msg').innerText = "Chat Pronta (" + langCode + ")";
                document.getElementById('status-msg').style.color = "green";
                document.getElementById('start-btn').style.display = 'none';
                
                // Mostriamo il nostro bottone Custom (quello nativo è fuori schermo)
                document.getElementById('customChatLauncher').style.display = 'flex';
            });

            window.addEventListener("onEmbeddedMessagingWindowMinimized", () => {
                console.log(">>> EVENTO: Window Minimized");
                // Nessun conflitto con API: riaccendiamo solo il nostro bottone
                document.getElementById('customChatLauncher').style.display = 'flex';
            });

            window.addEventListener("onEmbeddedMessagingWindowClosed", () => {
                console.log(">>> EVENTO: Window Closed");
                document.getElementById('customChatLauncher').style.display = 'flex';
            });

            // Inizializzazione Core
            embeddedservice_bootstrap.init(
                '00DUA000003hFV77',
                'GitZedv2Upload',
                'https://chogangroup--devai2.sandbox.my.site.com/ESWGitZedv2Upload1775142397588',
                {
                    scrt2URL: 'https://chogangroup--devai2.sandbox.my.salesforce-scrt.com'
                }
            );

        } catch (err) {
            console.error('Errore critico durante Init:', err);
            document.getElementById('status-msg').innerText = "Errore Init";
        }
    }

    function apriChatSalesforce() {
        if (typeof embeddedservice_bootstrap === 'undefined') return;

        // Nascondiamo il nostro bottone custom mentre l'interfaccia è aperta
        document.getElementById('customChatLauncher').style.display = 'none';

        console.log('[CustomChat] Lancio della chat via API nativa');
        embeddedservice_bootstrap.utilAPI.launchChat();
    }

  </script>
  <script type='text/javascript' src='https://chogangroup--devai2.sandbox.my.site.com/ESWGitZedv2Upload1775142397588/assets/js/bootstrap.min.js'></script>

</body>
</html>
